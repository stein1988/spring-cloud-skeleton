logging:
  level:
    root: INFO
    com.easy.query.core: DEBUG

# 配置数据源对应的 easy-query 信息
easy-query:
  database: pgsql
  name-conversion: underlined
  print-sql: true

# Sa-Token 配置 (文档: https://sa-token.cc)
sa-token:
  # token 名称（同时也是 cookie 名称）
  token-name: token
  # token 有效期（单位：秒） 默认30天，-1 代表永久有效
  timeout: 2592000
  # token 最低活跃频率（单位：秒），如果 token 超过此时间没有访问系统就会被冻结，默认-1 代表不限制，永不冻结
  active-timeout: -1
  # 是否允许同一账号多地同时登录 （为 true 时允许一起登录, 为 false 时新登录挤掉旧登录）
  is-concurrent: true
  # 在多人登录同一账号时，是否共用一个 token （为 true 时所有登录共用一个 token, 为 false 时每次登录新建一个 token）
  is-share: false
  # token 风格（默认可取值：uuid、simple-uuid、random-32、random-64、random-128、tik）
  token-style: uuid
  # 是否输出操作日志 
  is-log: true
  # jwt秘钥
  jwt-secret-key: 7b9e36c5f8a2d9047b9e36c5f8a2d905

# SpringDoc 核心配置
springdoc:
  # 1. API文档生成开关（生产环境建议关闭）
  api-docs:
    enabled: true
    path: /v3/api-docs  # OpenAPI规范文件路径（默认）
  # 2. Swagger UI 配置（可视化界面）
  swagger-ui:
    enabled: true
    path: /swagger-ui.html  # UI访问路径（简化版，可直接访问）
    operationsSorter: method  # 接口按HTTP方法排序（GET/POST/PUT/DELETE）
    tagsSorter: alpha         # 标签按字母排序
  # 3. 接口扫描规则（精准扫描，避免冗余）
  packages-to-scan: com.lonbon.cloud.user.api.controller  # 替换为你的控制器包路径
  paths-to-exclude: /error/**, /actuator/**      # 排除无需文档的路径

# OpenAPI 全局元信息（文档的基础说明）
openapi:
  info:
    title: "示例系统API文档"          # 文档标题
    description: "Spring Boot 4.0 + SpringDoc 生成API文档示例" # 文档描述
    version: "v1.0.0"              # 接口版本
    contact: # 维护人信息（可选）
      name: "开发团队"
      email: "dev@example.com"
  servers: # 接口访问环境（可选）
    - url: "http://localhost:8080"
      description: "本地开发环境"
  tags: # 接口分类标签（与控制器@Tag对应）
    - name: "用户接口"
      description: "用户相关的增删改查接口"